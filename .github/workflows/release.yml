name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------
  # Job 1: Code quality (fmt + clippy)
  # -----------------------------------------------
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83.0"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace

  # -----------------------------------------------
  # Job 2: Shell Runner Smoke Test
  # -----------------------------------------------
  shell-runner:
    name: Shell Runner Smoke Test
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Build shell runner image
        run: ./scripts/build_shell_runner.sh electro-shell-runner:release-ci

      - name: Smoke test shell runner image
        run: ./scripts/smoke_shell_runner.sh electro-shell-runner:release-ci

  # -----------------------------------------------
  # Job 3: Docker build verification
  # -----------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: electro:release-ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------
  # Job 4: Build and publish release binary
  # -----------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [check, shell-runner, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83.0"
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build x86_64 release binary
        run: cargo build --release --target x86_64-unknown-linux-musl --bin electro

      - name: Build aarch64 release binary
        run: cargo build --release --target aarch64-unknown-linux-musl --bin electro

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/electro dist/electro-x86_64-linux-musl
          cp target/aarch64-unknown-linux-musl/release/electro dist/electro-aarch64-linux-musl
          chmod +x dist/electro-x86_64-linux-musl dist/electro-aarch64-linux-musl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/electro-x86_64-linux-musl
            dist/electro-aarch64-linux-musl
          generate_release_notes: true
